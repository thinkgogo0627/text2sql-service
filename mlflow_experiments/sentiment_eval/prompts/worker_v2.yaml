# worker_v2.yaml — 금융 도메인 컨텍스트 추가
prompt: |
  아래는 한국 주식시장 상장기업의 금융 뉴스/공시 텍스트야.
  기업의 실적, 주가, 사업 전망, 투자자 관점에서 감성을 분석해.

  규칙:
  - sentiment_score: -1.0(매우 부정) ~ 1.0(매우 긍정)
  - 영업이익 증가, 신사업 수주, 주가 상승, 랠리, 호황 → 긍정
  - 실적 악화, 소송, 대규모 손실, 구조조정 → 부정
  - JSON 형식으로만 반환. 설명 없이.

  형식:
  {"sentiment_score": 0.5, "summary": "..."}

  [텍스트]
  {text}